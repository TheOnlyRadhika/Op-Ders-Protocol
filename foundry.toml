[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer_runs = 200
via_ir = true
optimizer = true
remappings = ["@openzeppelin/contracts = lib/openzeppelin-contracts/contracts"]

[profile.test]
optimizer_runs = 100
